/* ============================== STORAGE LAYER (with safe fallback) ============================== */
// Falls back to an in-memory store if window.storage isn't available, so the UI
// always works even if persistence isn't possible in this environment.
const memoryStore = {};
let storageAvailable = true;

async function probeStorage() {
  try {
    if (!window.storage || typeof window.storage.set !== "function") {
      storageAvailable = false;
      return;
    }
    await window.storage.set("__probe__", "1", true);
    storageAvailable = true;
  } catch (e) {
    console.warn("Persistent storage unavailable, using in-memory fallback:", e);
    storageAvailable = false;
  }
}

async function storageSet(key, value, shared) {
  const json = JSON.stringify(value);
  if (storageAvailable) {
    try {
      await window.storage.set(key, json, shared);
      return true;
    } catch (e) {
      console.warn("storage.set failed, falling back to memory:", e);
    }
  }
  memoryStore[key] = json;
  return true;
}

async function storageGet(key, shared) {
  if (storageAvailable) {
    try {
      const res = await window.storage.get(key, shared);
      return res ? JSON.parse(res.value) : null;
    } catch (e) {
      // key not found throws in this API — treat as null
      if (memoryStore[key] !== undefined) return JSON.parse(memoryStore[key]);
      return null;
    }
  }
  return memoryStore[key] !== undefined ? JSON.parse(memoryStore[key]) : null;
}

async function storageList(prefix, shared) {
  if (storageAvailable) {
    try {
      const res = await window.storage.list(prefix, shared);
      const remoteKeys = res ? res.keys : [];
      return remoteKeys;
    } catch (e) {
      console.warn("storage.list failed:", e);
    }
  }
  return Object.keys(memoryStore).filter(k => k.startsWith(prefix));
}

async function storageDelete(key, shared) {
  if (storageAvailable) {
    try {
      await window.storage.delete(key, shared);
    } catch (e) { /* ignore */ }
  }
  delete memoryStore[key];
}

const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);

function timeAgo(ts){
  const diff = Math.max(0, Date.now() - ts);
  const m = Math.floor(diff/60000);
  if (m < 1) return "เมื่อสักครู่";
  if (m < 60) return m + " นาทีที่แล้ว";
  const h = Math.floor(m/60);
  if (h < 24) return h + " ชั่วโมงที่แล้ว";
  const d = Math.floor(h/24);
  if (d < 30) return d + " วันที่แล้ว";
  return new Date(ts).toLocaleDateString("th-TH", { day:"numeric", month:"short", year:"numeric" });
}

function esc(str){
  const div = document.createElement("div");

}

/* ============================== IMAGE UPLOAD ============================== */
const MAX_IMAGE_MB = 8;

function fileToDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("อ่านไฟล์ไม่สำเร็จ"));
    reader.readAsDataURL(file);
  });
}

// Uploads a File to Firebase Storage and returns its public download URL.
// Throws if Firebase isn't configured or the upload fails — callers must catch.
function uploadImageToFirebase(file, folder, onProgress){
  return new Promise((resolve, reject) => {
    if (!firebaseReady || !storageRef){
      reject(new Error("ยังไม่ได้ตั้งค่า Firebase — ใส่ firebaseConfig ในไฟล์ก่อนใช้งานรูปภาพ"));
      return;
    }
    if (!file.type.startsWith("image/")){
      reject(new Error("ไฟล์ที่เลือกไม่ใช่รูปภาพ"));
      return;
    }
    if (file.size > MAX_IMAGE_MB * 1024 * 1024){
      reject(new Error(`ไฟล์ใหญ่เกินไป (สูงสุด ${MAX_IMAGE_MB}MB)`));
      return;
    }
    const path = `${folder}/${Date.now()}_${uid()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
    const ref = storageRef.ref().child(path);
    const task = ref.put(file);
    task.on("state_changed",
      (snap) => {
        const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
        if (onProgress) onProgress(pct);
      },
      (err) => {
        console.error("Upload failed:", err);
        reject(err);
      },
      async () => {
        try {
          const url = await task.snapshot.ref.getDownloadURL();
          resolve(url);
        } catch (err){
          reject(err);
        }
      }
    );
  });
}

// Generic wiring for an "attach image" control. Returns an object with
// .getFile() / .getDataUrl() / .reset() so forms can read the picked file at submit time.
function wireImageAttach({ btnId, inputId, previewSlotId, onChange }){
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  const previewSlot = document.getElementById(previewSlotId);
  let pickedFile = null;

  if (!btn || !input) return { getFile: () => null, reset(){} };

  btn.addEventListener("click", () => input.click());

  input.addEventListener("change", async () => {
    const file = input.files && input.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")){
      showToast("เลือกได้เฉพาะไฟล์รูปภาพเท่านั้น");
      input.value = "";
      return;
    }
    if (file.size > MAX_IMAGE_MB * 1024 * 1024){
      showToast(`ไฟล์ใหญ่เกินไป (สูงสุด ${MAX_IMAGE_MB}MB)`);
      input.value = "";
      return;
    }
    pickedFile = file;
    btn.classList.add("has-img");
    try {
      const dataUrl = await fileToDataURL(file);
      if (previewSlot){
        previewSlot.innerHTML = `
          <div class="img-preview-wrap">
            <img class="img-preview-thumb" src="${dataUrl}" alt="พรีวิวรูปที่เลือก">
            <button type="button" class="img-preview-remove" id="${previewSlotId}-remove">${iconSvg('x',13,'#fff',3)}</button>
          </div>`;
        renderIcons();
        document.getElementById(`${previewSlotId}-remove`).addEventListener("click", (e) => {
          e.stopPropagation();
          pickedFile = null;
          input.value = "";
          btn.classList.remove("has-img");
          previewSlot.innerHTML = "";
          if (onChange) onChange(null);
        });
      }
    } catch(e){
      console.error(e);
    }
    if (onChange) onChange(pickedFile);
  });

  return {
    getFile: () => pickedFile,
    reset(){
      pickedFile = null;
      input.value = "";
      btn.classList.remove("has-img");
      if (previewSlot) previewSlot.innerHTML = "";
    },
  };
}

function wireLoginEvents(){
  document.getElementById("tab-login").addEventListener("click", () => { loginMode="login"; renderLogin(); });

  const roleGrid = document.getElementById("role-grid");

    roleGrid.querySelectorAll(".role-btn").forEach(btn => {

        loginRole = btn.getAttribute("data-role");

      });
    });
  }

async function handleLoginSubmit(e){
  e.preventDefault();
  const errEl = document.getElementById("login-error");
  errEl.innerHTML = "";

  const username = document.getElementById("f-username").value.trim();
  const password = document.getElementById("f-password").value;
  const grade = document.getElementById("f-grade") ? document.getElementById("f-grade").value : null;
  const adminCodeInput = document.getElementById("f-admincode");
  const adminCode = adminCodeInput ? adminCodeInput.value : "";

  function setError(msg){
    errEl.innerHTML = `<div class="error-box">${iconSvg('alert-circle',15,'var(--danger)')} ${esc(msg)}</div>`;
    renderIcons();
  }

  if (!username || !password){
    setError("กรอกชื่อผู้ใช้และรหัสผ่านให้ครบ");
    return;
  }
  if (loginMode === "register" && loginRole === "admin" && adminCode !== ADMIN_PASSWORD){
    setError("รหัสแอดมินไม่ถูกต้อง");
    return;
  }

  const submitBtn = document.getElementById("submit-btn");
  const submitLabel = document.getElementById("submit-label");
  submitBtn.disabled = true;
  const originalLabel = submitLabel.textContent;
  submitLabel.innerHTML = `${iconSvg('loader-2',17,'var(--navy-deep)')} กำลังดำเนินการ...`;
  renderIcons();
  const spinEl = submitLabel.querySelector('[data-lucide="loader-2"]');
  if (spinEl) spinEl.classList.add("spin");

  try {
    const key = "user:" + username.toLowerCase();
    const existing = await storageGet(key, true);

    if (loginMode === "register"){
      if (existing){
        setError("มีชื่อผู้ใช้นี้แล้ว ลองชื่ออื่น หรือเข้าสู่ระบบแทน");
        return;
      }
      const user = {
        username, password,
        grade: loginRole === "student" ? grade : null,
        role: loginRole,
        createdAt: Date.now(),
      };
      const ok = await storageSet(key, user, true);
      if (!ok){
        setError("บันทึกไม่สำเร็จ ลองอีกครั้ง");
        return;
      }
      currentUser = user;
      renderApp();
    } else {
      if (!existing){
        setError("ไม่พบบัญชีนี้ ลองสมัครสมาชิกก่อน");
        return;
      }
      if (existing.password !== password){
        setError("รหัสผ่านไม่ถูกต้อง");
        return;
      }
      currentUser = existing;
      renderApp();
    }
  } catch (err){
    console.error("Login error:", err);
    setError("เกิดข้อผิดพลาด ลองอีกครั้ง");
  } finally {
    submitBtn.disabled = false;
    submitLabel.textContent = originalLabel;
  }
}

function wireAnnounceForm(){
  const titleInput = document.getElementById("an-title");
  const submitBtn = document.getElementById("an-submit");
  const updateState = () => { submitBtn.disabled = !titleInput.value.trim(); };
  titleInput.addEventListener("input", updateState);

  const imgAttach = wireImageAttach({
    btnId: "an-img-btn", inputId: "an-img-input", previewSlotId: "an-img-preview",
  });

  document.getElementById("close-announce-form").addEventListener("click", () => {
    document.getElementById("announce-form-slot").innerHTML = "";
  });

  submitBtn.addEventListener("click", async () => {
    const title = titleInput.value.trim();
    if (!title) return;
    submitBtn.disabled = true;
    const body = document.getElementById("an-body").value.trim();
    const category = document.getElementById("an-category").value;
    const pinned = document.getElementById("an-pinned").checked;
    const id = uid();
    const file = imgAttach.getFile();
    const origLabel = submitBtn.innerHTML;

    try {
      let imageUrl = null;
      if (file){
        submitBtn.innerHTML = `${iconSvg('loader-2',15,'#fff')} <span>กำลังอัปโหลดรูป...</span>`;
        const spinEl = submitBtn.querySelector('[data-lucide="loader-2"]');
        renderIcons();
        if (spinEl) spinEl.classList.add("spin");
        imageUrl = await uploadImageToFirebase(file, "announcements", (pct) => {
          const label = submitBtn.querySelector("span");
          if (label) label.textContent = `กำลังอัปโหลดรูป... ${pct}%`;
        });
      }
      await storageSet("announce:" + id, {
        id, title, body, category, pinned, imageUrl,
        author: currentUser.username, createdAt: Date.now(),
      }, true);
      document.getElementById("announce-form-slot").innerHTML = "";
      showToast("เผยแพร่ประกาศแล้ว");
      await loadAnnouncements();
    } catch(e){
      console.error(e);
      showToast(e.message || "เกิดข้อผิดพลาด ลองอีกครั้ง");
      submitBtn.disabled = false;
      submitBtn.innerHTML = origLabel;
      renderIcons();
    }
  });
}

async function loadAnnouncements(){
  const listEl = document.getElementById("announce-list");
  try {
    const keys = await storageList("announce:", true);
    const items = (await Promise.all(keys.map(k => storageGet(k, true)))).filter(Boolean);
    items.sort((a,b) => (b.pinned - a.pinned) || (b.createdAt - a.createdAt));

    if (items.length === 0){
      listEl.innerHTML = emptyStateHtml('megaphone','ยังไม่มีประกาศ','เมื่อพี่สภามีประกาศใหม่ จะมาแสดงที่นี่');
      renderIcons();
      return;
    }

    const isAdmin = currentUser.role === "admin";
    listEl.innerHTML = `<div style="display:grid; gap:12px;">${items.map(p => announceCardHtml(p, isAdmin)).join("")}</div>`;
    renderIcons();
    wireLightboxImages(listEl);

    if (isAdmin){
      listEl.querySelectorAll("[data-delete-announce]").forEach(btn => {
        btn.addEventListener("click", async () => {
          await storageDelete("announce:" + btn.getAttribute("data-delete-announce"), true);
          showToast("ลบประกาศแล้ว");
          loadAnnouncements();
        });
      });
    }
  } catch(e){
    console.error(e);
    listEl.innerHTML = emptyStateHtml('alert-circle','โหลดข้อมูลไม่สำเร็จ','ลองรีเฟรชหน้าใหม่อีกครั้ง');

  }
}

function wireQACards(items, isAdmin){
  document.querySelectorAll("[data-delete-q]").forEach(btn => {
    btn.addEventListener("click", async () => {
      await storageDelete("qa:" + btn.getAttribute("data-delete-q"), true);
      showToast("ลบคำถามแล้ว");
      loadQuestions();
    });
  });

  if (!isAdmin) return;

  document.querySelectorAll("[data-answer-btn]").forEach(btn => {
    btn.addEventListener("click", () => {
      const qid = btn.getAttribute("data-answer-btn");
      const q = items.find(i => i.id === qid);
      const zone = document.querySelector(`[data-answer-zone="${qid}"]`);
      zone.innerHTML = `
        <textarea class="input" id="ans-text-${qid}" rows="2" placeholder="พิมพ์คำตอบ..." style="margin-bottom:8px;"></textarea>
        <div style="display:flex; gap:8px;">
          <button class="btn-primary font-display" id="ans-submit-${qid}" style="padding:8px 14px; font-size:13px;" disabled>ส่งคำตอบ</button>
          <button class="btn-ghost font-display" id="ans-cancel-${qid}" style="padding:8px 14px; font-size:13px;">ยกเลิก</button>
        </div>`;
      const ta = document.getElementById("ans-text-" + qid);
      const submitBtn = document.getElementById("ans-submit-" + qid);
      ta.addEventListener("input", () => { submitBtn.disabled = !ta.value.trim(); });
      document.getElementById("ans-cancel-" + qid).addEventListener("click", loadQuestions);
      submitBtn.addEventListener("click", async () => {
        const answer = ta.value.trim();
        if (!answer) return;
        submitBtn.disabled = true;
        try {
          await storageSet("qa:" + qid, { ...q, answer, answeredAt: Date.now() }, true);
          showToast("ส่งคำตอบแล้ว");
          loadQuestions();
        } catch(e){
          console.error(e);
          showToast("เกิดข้อผิดพลาด ลองอีกครั้ง");
        }
      });
    });
  });
}

async function sendChatMessage(chatImgAttach){
  const input = document.getElementById("chat-input");
  const sendBtn = document.getElementById("chat-send");
  const text = input.value.trim();
  const file = chatImgAttach ? chatImgAttach.getFile() : null;
  if (!text && !file) return;
  input.value = "";
  sendBtn.disabled = true;
  try {
    let imageUrl = null;
    if (file){
      imageUrl = await uploadImageToFirebase(file, "chat", null);
      chatImgAttach.reset();
    }
    const id = uid();
    await storageSet("chat:" + id, {
      id, text, imageUrl, author: currentUser.username, role: currentUser.role, createdAt: Date.now(),
    }, true);
    await loadChatMessages();
  } catch(e){
    console.error(e);
    showToast(e.message || "ส่งข้อความไม่สำเร็จ");
  }
}

async function loadChatMessages(){
  const listEl = document.getElementById("chat-messages");
  if (!listEl) return;
  try {
    const keys = await storageList("chat:", true);
    const items = (await Promise.all(keys.map(k => storageGet(k, true)))).filter(Boolean);
    items.sort((a,b) => a.createdAt - b.createdAt);
    const recent = items.slice(-150);

    const wasAtBottom = listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight < 60;

    if (recent.length === 0){
      listEl.innerHTML = `<div style="margin:auto;">${emptyStateHtml('message-circle','ยังไม่มีข้อความ','เริ่มบทสนทนาแรกของวันนี้กันเลย')}</div>`;
    } else {
      listEl.innerHTML = recent.map(m => {
        const mine = m.author === currentUser.username;
        const hasImg = !!m.imageUrl;
        return `
        <div class="chat-row ${mine?'mine':''}">
          ${avatar(m.author, m.role, 28)}
          <div class="chat-bubble-wrap">
            <div class="chat-meta">
              <span class="font-display" style="font-size:12px; font-weight:600;">${esc(m.author)}</span>
              ${roleBadge(m.role)}
            </div>
            <div class="chat-bubble ${hasImg?'has-img':''}">
              ${hasImg ? `<img class="chat-bubble-img" src="${m.imageUrl}" alt="รูปภาพในแชท" data-lightbox-src="${m.imageUrl}" loading="lazy">` : ""}
              ${m.text ? `<div style="${hasImg?'padding:7px 5px 2px;':''}">${esc(m.text)}</div>` : ""}
            </div>
            <div class="chat-time">${timeAgo(m.createdAt)}</div>
          </div>
        </div>`;
      }).join("");
    }
    renderIcons();
    wireLightboxImages(listEl);

  } catch(e){
    console.error(e);
  }
}

          <span style="font-size:11.5px; color:var(--ink-soft);">· ${timeAgo(p.createdAt)}</span>
        </div>
        ${p.text ? `<p style="margin:6px 0 0; font-size:14.5px; color:var(--ink); line-height:1.65; white-space:pre-wrap;">${esc(p.text)}</p>` : ""}
        ${p.imageUrl ? `<img class="post-image" src="${p.imageUrl}" alt="รูปภาพในโพสต์" data-lightbox-src="${p.imageUrl}" loading="lazy">` : ""}
        <div style="display:flex; align-items:center; gap:14px; margin-top:10px;">
          <button class="font-display" data-like-btn="${p.id}" style="display:flex; align-items:center; gap:5px; border:none; background:transparent; color:${liked?'var(--gold)':'var(--ink-soft)'}; font-size:12.5px; font-weight:600; padding:4px 6px;">
            ${iconSvg('thumbs-up',14, liked?'var(--gold)':'var(--ink-soft)')} ${(p.likedBy||[]).length || ""} ถูกใจ
          </button>
          ${canDelete ? `<button class="btn-icon" style="color:var(--danger);" data-delete-post="${p.id}">${iconSvg('trash-2',13,'var(--danger)')}</button>` : ""}
        </div>
      </div>
    </div>
  </div>`;
}

function wireFeedCards(items){
  document.querySelectorAll("[data-like-btn]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const pid = btn.getAttribute("data-like-btn");
      const post = items.find(i => i.id === pid);
      const likedBy = post.likedBy || [];
      const liked = likedBy.includes(currentUser.username);
      const newLikedBy = liked ? likedBy.filter(u => u !== currentUser.username) : [...likedBy, currentUser.username];
      const updated = { ...post, likedBy: newLikedBy };
      post.likedBy = newLikedBy;
      try {
        await storageSet("feedpost:" + pid, updated, true);
        loadFeed();
      } catch(e){ console.error(e); }
    });
  });
  document.querySelectorAll("[data-delete-post]").forEach(btn => {
    btn.addEventListener("click", async () => {
      await storageDelete("feedpost:" + btn.getAttribute("data-delete-post"), true);
      showToast("ลบโพสต์แล้ว");
      loadFeed();
    });
  });
}

/* ============================== START ============================== */
boot().catch(e => {
  console.error("Boot failed:", e);
  document.getElementById("root").innerHTML = `<div style="padding:40px; text-align:center; color:#C0392B; font-family:sans-serif;">เกิดข้อผิดพลาดในการโหลดเว็บ กรุณารีเฟรชหน้าใหม่</div>`;
});
</script>

<style>
  :root{
    --navy:#0B3D91; --navy-deep:#082A66; --blue:#1E5FBF;
    --gold:#F2B705; --gold-deep:#C98F00;
    --paper:#FAFAF7; --paper-deep:#F1EDE2;
    --ink:#1A1A1A; --ink-soft:#6B7280; --line:#E4DFD0; --danger:#C0392B;
  }
  /* ========== DARK MODE ========== */
  body.dark-mode {
    --navy:#4A7FD4; --navy-deep:#3060B0; --blue:#5E9AE8;
    --gold:#F2B705; --gold-deep:#D4A200;
    --paper:#111318; --paper-deep:#1A1D26;
    --ink:#E8ECF4; --ink-soft:#8A95AA; --line:#2A2E3D; --danger:#E05C5C;
  }
  body.dark-mode #sidebar { background:#0D1117; }
  body.dark-mode .card { background:#1A1D26; border-color:var(--line); }
  body.dark-mode .input { background:#1A1D26; border-color:var(--line); color:var(--ink); }
  body.dark-mode .btn-ghost { background:#1A1D26; border-color:var(--line); }
  body.dark-mode .tab-btn.active { background:#1A1D26; }
  body.dark-mode .tabs { background:var(--paper-deep); }
  body.dark-mode #mobile-bottomnav { background:#0D1117; border-color:var(--line); }
  body.dark-mode #mobile-topbar { background:#0D1117; }
  body.dark-mode .setup-step { background:#1A1D26; }
  body.dark-mode .chat-bubble { background:var(--paper-deep); }
  body.dark-mode .google-btn { background:#1A1D26; border-color:var(--line); color:var(--ink); }
  body.dark-mode .google-btn:hover { background:#22263A; }
  body.dark-mode .role-btn { background:#1A1D26; border-color:var(--line); }
  body.dark-mode .role-btn.active { background:rgba(74,127,212,.12); }
  body.dark-mode .img-attach-btn { background:#1A1D26; }
  body.dark-mode .empty-state { background:#1A1D26; }
  body.dark-mode .poll-option-bar { background:#22263A; }
  body.dark-mode textarea.input { background:#1A1D26; }
  body.dark-mode select.input { background:#1A1D26; color:var(--ink); }
  body.dark-mode .ticket-status-badge { filter:brightness(0.85); }
  body.dark-mode #login-screen {
    background: radial-gradient(circle at 15% -10%, rgba(74,127,212,0.18), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(242,183,5,0.12), transparent 45%), var(--paper);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ font-family:'Sarabun',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; }
  .font-display{font-family:'Kanit',sans-serif;}
  ::selection{background:var(--gold); color:var(--navy);}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:'Sarabun',sans-serif;}
  ::-webkit-scrollbar{width:6px; height:6px;}
  ::-webkit-scrollbar-thumb{background:#D8D2C4; border-radius:99px;}
  ::-webkit-scrollbar-track{background:transparent;}
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
    outline:2px solid var(--gold); outline-offset:2px;
  }
  @keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
  @keyframes popIn{from{opacity:0; transform:scale(0.96);} to{opacity:1; transform:scale(1);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  .fade-up{animation:fadeUp .35s ease both;}
  .pop-in{animation:popIn .25s ease both;}
  .spin{animation:spin .8s linear infinite;}
  @media (prefers-reduced-motion: reduce){ .fade-up,.pop-in,.spin{animation:none !important;} }
 
  .input{ width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--line); font-size:14.5px; color:var(--ink); background:#fff; }
  .btn-primary{ display:inline-flex; align-items:center; gap:6px; padding:10px 16px; border-radius:11px; border:none; background:var(--navy); color:#fff; font-weight:600; font-size:13.5px; }
  .btn-primary:disabled{opacity:.5; cursor:default;}
  .btn-ghost{ display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border-radius:10px; border:1.5px solid var(--line); background:#fff; color:var(--navy); font-weight:600; font-size:13px; }
  .btn-icon{ border:none; background:transparent; color:var(--ink-soft); padding:6px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; }
  .card{ background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:18px; }
  .badge{ display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; white-space:nowrap; }
  .avatar{ border-radius:999px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
  .toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:10px; font-size:13.5px; z-index:200; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; font-weight:500; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }
 
  /* ---------- Setup screen ---------- */
  #setup-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--paper); }
  .setup-wrap{ width:100%; max-width:480px; }
  .setup-step{ background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:22px; margin-bottom:14px; }
  .setup-step-num{ width:28px; height:28px; border-radius:999px; background:var(--navy); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; margin-right:8px; flex-shrink:0; }
  .setup-step-title{ font-weight:700; font-size:15px; color:var(--navy); display:flex; align-items:center; margin-bottom:10px; }
  .setup-step p{ margin:0 0 10px; font-size:13.5px; color:var(--ink-soft); line-height:1.65; }
  .setup-step code{ background:var(--paper-deep); padding:2px 7px; border-radius:6px; font-size:12.5px; font-family:monospace; }
  .setup-step pre{ background:var(--paper-deep); border-radius:10px; padding:12px; font-size:12px; overflow-x:auto; line-height:1.7; margin:8px 0; }
 
  /* ---------- Login screen ---------- */
  #login-screen{ min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:20px;
    background: radial-gradient(circle at 15% -10%, rgba(30,95,191,0.13), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(242,183,5,0.15), transparent 45%), var(--paper); }
  .login-wrap{ width:100%; max-width:420px; }
  .brand-mark{ width:56px; height:56px; border-radius:16px; margin:0 auto 14px; background:linear-gradient(135deg, var(--navy), var(--blue)); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px -8px rgba(11,61,145,.5); }
  .tabs{ display:flex; background:var(--paper-deep); border-radius:12px; padding:4px; margin-bottom:18px; }
  .tab-btn{ flex:1; padding:9px 0; border-radius:9px; border:none; background:transparent; color:var(--ink-soft); font-weight:600; font-size:14px; transition:all .15s; }
  .tab-btn.active{ background:#fff; color:var(--navy); box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .role-grid{ display:flex; gap:8px; }
  .role-btn{ flex:1; padding:10px 4px; border-radius:10px; cursor:pointer; border:1.5px solid var(--line); background:#fff; color:var(--ink-soft); font-size:12.5px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:4px; transition:all .15s; }
  .role-btn.active{ border-color:var(--navy); background:rgba(11,61,145,.06); color:var(--navy); }
  .error-box{ display:flex; align-items:center; gap:6px; color:var(--danger); background:#FBEAE8; padding:9px 12px; border-radius:9px; font-size:13px; margin-bottom:14px; }
  .submit-btn{ width:100%; padding:12px 0; border-radius:11px; border:none; background:var(--gold); color:var(--navy-deep); font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 8px 20px -8px rgba(242,183,5,.6); }
  .submit-btn:disabled{opacity:.6; cursor:default; box-shadow:none;}
  .divider-or{ display:flex; align-items:center; gap:10px; margin:18px 0 14px; color:var(--ink-soft); font-size:12.5px; }
  .divider-or::before, .divider-or::after{ content:""; flex:1; height:1px; background:var(--line); }
  .google-btn{ width:100%; padding:11px 0; border-radius:11px; border:1.5px solid var(--line); background:#fff; color:var(--ink); font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; gap:10px; transition:background .15s, border-color .15s; }
  .google-btn:hover{ background:var(--paper-deep); }
  .google-btn:disabled{ opacity:.55; cursor:default; }
 
  /* ---------- Shell ---------- */
  #app-shell{ display:flex; min-height:100vh; }
  #sidebar{ width:230px; flex-shrink:0; background:var(--navy); color:#fff; display:none; flex-direction:column; padding:22px 14px; position:sticky; top:0; height:100vh; }
  .side-brand{ display:flex; align-items:center; gap:10px; padding:0 8px 22px; }
  .side-brand-icon{ width:36px; height:36px; border-radius:10px; background:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .nav-btn{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; border:none; background:transparent; color:#D9E2F5; font-weight:500; font-size:14px; text-align:left; transition:all .15s; width:100%; }
  .nav-btn.active{ background:rgba(242,183,5,.16); color:var(--gold); font-weight:700; }
  .side-user{ display:flex; align-items:center; gap:8px; padding:0 8px; margin-bottom:10px; }

/* ============================== FIREBASE DATABASE HELPERS ============================== */
// Thin wrappers ที่ทำให้โค้ดส่วนที่เหลือเหมือนเดิมเกือบทั้งหมด
 
function dbRef(path){ return db.ref(path); }
 
// ครอบ promise ของ Firebase ด้วย timeout กันค้างตลอดไปถ้าเน็ตช้า/หลุด หรือ rules ไม่ให้ผ่าน
function withTimeout(promise, ms, label){
  ms = ms || 15000;
  return Promise.race([
    promise,
    new Promise((_, reject)=> setTimeout(()=> reject(new Error("timeout:"+(label||""))), ms))
  ]);
}
 
async function dbSet(path, value){
  await withTimeout(dbRef(path).set(value), 15000, path);
}
async function dbGet(path){
  const snap = await withTimeout(dbRef(path).once("value"), 15000, path);
  return snap.val();
}
async function dbPush(path, value){
  const ref = dbRef(path).push();
  await withTimeout(ref.set({ ...value, id: ref.key }), 15000, path);
  return ref.key;
}
async function dbDelete(path){
  await withTimeout(dbRef(path).remove(), 15000, path);
}
// ฟัง real-time เพื่อ live update
function dbListen(path, cb){
  const ref = dbRef(path);
  ref.on("value", snap => cb(snap.val()));
  return () => ref.off("value");
}
function dbListenChild(path, onAdd, onRemove){
  const ref = dbRef(path);
  ref.on("child_added",   snap => onAdd(snap.key, snap.val()));
  ref.on("child_removed", snap => onRemove && onRemove(snap.key));
  return () => ref.off();
}
 
/* ============================== IMAGE (Base64 compress) ============================== */
const MAX_IMAGE_MB = 4;
const IMG_MAX_PX   = 800;
const IMG_QUALITY  = 0.72;
 
function compressImage(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (Math.max(width, height) > IMG_MAX_PX){
        const r = IMG_MAX_PX / Math.max(width, height);
        width = Math.round(width * r); height = Math.round(height * r);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", IMG_QUALITY));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("อ่านรูปไม่สำเร็จ")); };
    img.src = url;
  });
}
 
async function processImageFile(file, onProgress){
  if (!file.type.startsWith("image/")) throw new Error("ไฟล์ที่เลือกไม่ใช่รูปภาพ");
  if (file.size > MAX_IMAGE_MB * 1024 * 1024) throw new Error(`ไฟล์ใหญ่เกินไป (สูงสุด ${MAX_IMAGE_MB}MB)`);
  if (onProgress) onProgress(40);
  const dataUrl = await compressImage(file);
  if (onProgress) onProgress(100);
  return dataUrl;
}

    const file = input.files && input.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")){ showToast("เลือกได้เฉพาะไฟล์รูปภาพ"); input.value=""; return; }
    if (file.size > MAX_IMAGE_MB * 1024 * 1024){ showToast(`ไฟล์ใหญ่เกิน ${MAX_IMAGE_MB}MB`); input.value=""; return; }
    pickedFile = file; btn.classList.add("has-img");
    try {
      const reader = new FileReader();
      reader.onload = () => {
        if (previewSlot){
          previewSlot.innerHTML = `<div class="img-preview-wrap"><img class="img-preview-thumb" src="${reader.result}"><button type="button" class="img-preview-remove" id="${previewSlotId}-rm">${iconSvg('x',13,'#fff',3)}</button></div>`;
          renderIcons();
          document.getElementById(`${previewSlotId}-rm`).addEventListener("click", e => {
            e.stopPropagation(); pickedFile=null; input.value=""; btn.classList.remove("has-img"); previewSlot.innerHTML=""; if(onChange) onChange(null);
          });
        }
      };
      reader.readAsDataURL(file);
    } catch(e){ console.error(e); }
    if (onChange) onChange(pickedFile);
  });
  return { getFile: () => pickedFile, reset(){ pickedFile=null; input.value=""; btn.classList.remove("has-img"); if(previewSlot) previewSlot.innerHTML=""; } };
}

function timeAgo(ts){
  const d=Math.max(0,Date.now()-ts), m=Math.floor(d/60000);
  if(m<1)return"เมื่อสักครู่"; if(m<60)return m+" นาทีที่แล้ว";
  const h=Math.floor(m/60); if(h<24)return h+" ชั่วโมงที่แล้ว";
  const dy=Math.floor(h/24); if(dy<30)return dy+" วันที่แล้ว";
  return new Date(ts).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"});
}

function wireUsernameSanitizer(inputEl){
  if(!inputEl) return;
  inputEl.addEventListener("input", ()=>{
    const cleaned = inputEl.value.toLowerCase().replace(/[^a-z0-9ก-๙_]/g, "");
    if (cleaned !== inputEl.value){
      const pos = inputEl.selectionStart - (inputEl.value.length - cleaned.length);
      inputEl.value = cleaned;
      try { inputEl.setSelectionRange(pos, pos); } catch(e){}
    }
  });
}

/* ============================== APP BOOT ============================== */
async function boot(){
  // ดึงค่า dark mode ที่บันทึกไว้
  if(localStorage.getItem("njw_dark") === "1") document.body.classList.add("dark-mode");
  if (!fbReady){ renderSetup(); return; }
 
  // ดูว่า Firebase Auth มีเซสชันอยู่ไหม (login อยู่จากครั้งก่อน)
  root().innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);gap:10px;">${iconSvg('loader-2',22,'var(--ink-soft)')} <span style="font-size:15px;">กำลังโหลด...</span></div>`;
  renderIcons();
  const spinEl = document.querySelector('[data-lucide="loader-2"]');
  if(spinEl) spinEl.classList.add("spin");
 
  let bootResolved = false; // กันทำงานซ้ำระหว่าง listener จริงกับ timeout fallback ด้านล่าง
 
  const bootTimeoutId = setTimeout(()=>{
    if (bootResolved) return;
    bootResolved = true;
    console.error("boot() onAuthStateChanged ไม่ fire ภายในเวลาที่กำหนด — น่าจะเชื่อมต่อ Firebase ไม่ได้ (เน็ตบล็อก/ไฟร์วอลล์/อินเทอร์เน็ตหลุด)");
    renderLogin();
    const errEl = document.getElementById("login-error");
    if (errEl){
      errEl.innerHTML = `<div class="error-box">${iconSvg('alert-circle',15,'var(--danger)')} เชื่อมต่อระบบล็อกอินไม่ได้ ตรวจสอบอินเทอร์เน็ต หรือเครือข่ายอาจบล็อก Firebase แล้วลองรีเฟรชหน้าใหม่</div>`;
      renderIcons();
    }
  }, 10000);
 
  auth.onAuthStateChanged(async fbUser => {
    if (bootResolved) return; // timeout fallback ทำงานไปแล้ว ไม่ต้องทำซ้ำ
    bootResolved = true;
    clearTimeout(bootTimeoutId);
    if (isAuthFlowInProgress) return; // กันไม่ให้แทรกแซงระหว่าง handleLoginSubmit/handleGoogleSignIn กำลังทำงานอยู่ (race condition ทำลายฟอร์มที่ submit อยู่)
    try {
      if (fbUser){
        // โหลดข้อมูล user จาก DB
        const profile = await dbGet("users/" + fbUser.uid);
        if (profile){
          currentUser = { ...profile, uid: fbUser.uid };
          renderApp();
          return;
        }
        // มี session แต่ยังไม่มี profile (เช่น login ด้วย Google ครั้งแรกแล้วปิดแอปไปก่อนเลือก role)
        if (fbUser.providerData && fbUser.providerData.some(p=>p.providerId==="google.com")){
          renderGoogleCompleteProfile(fbUser);
          return;
        }
      }
      renderLogin();
    } catch(err){
      // กันค้างหน้า "กำลังโหลด..." ตลอดไปถ้า dbGet timeout หรือ error อื่นๆ — แสดงหน้า login พร้อมข้อความแจ้งเตือนแทน
      console.error("boot() auth state error:", err);
      renderLogin();
      const errEl = document.getElementById("login-error");
      if (errEl){
        const isTimeout = err && err.message && err.message.indexOf("timeout:") === 0;
        const msg = isTimeout ? "เชื่อมต่อฐานข้อมูลช้าเกินไป ตรวจสอบอินเทอร์เน็ตแล้วลองรีเฟรชหน้าใหม่" : "เกิดข้อผิดพลาด: " + (err.message||"");
        errEl.innerHTML = `<div class="error-box">${iconSvg('alert-circle',15,'var(--danger)')} ${esc(msg)}</div>`;
        renderIcons();
      }
    }
  });
}

  e.preventDefault();

  function setError(msg){ errEl.innerHTML=`<div class="error-box">${iconSvg('alert-circle',15,'var(--danger)')} ${esc(msg)}</div>`; renderIcons(); }
 
  if (!username || !password){ setError("กรอกชื่อผู้ใช้และรหัสผ่านให้ครบ"); return; }
  if (!/^[a-z0-9ก-๙_]+$/.test(username)){ setError("ชื่อผู้ใช้ใช้ได้แค่ตัวอักษร ตัวเลข และขีดล่าง (_) ห้ามมีเว้นวรรค"); return; }
  if (password.length < 6){ setError("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร"); return; }
  if (loginMode==="register" && loginRole==="admin" && adminCode!==ADMIN_PASSWORD){ setError("รหัสแอดมินไม่ถูกต้อง"); return; }
  if (!fbReady || !db || !auth){ setError("ยังเชื่อมต่อระบบไม่ได้ ตรวจสอบ firebaseConfig หรืออินเทอร์เน็ตแล้วลองใหม่"); return; }
 
  const submitBtn   = document.getElementById("submit-btn");
  const submitLabel = document.getElementById("submit-label");
  submitBtn.disabled = true;
  submitLabel.innerHTML = `${iconSvg('loader-2',17,'var(--navy-deep)')} กำลังดำเนินการ...`;
  renderIcons();
  const sp = submitLabel.querySelector('[data-lucide="loader-2"]');
  if(sp) sp.classList.add("spin");
 
  // Firebase Auth ใช้ email จริง → เราสร้าง fake email จาก username
  const fakeEmail = username + "@school.internal";
 
  isAuthFlowInProgress = true; // กัน onAuthStateChanged แทรกแซง renderLogin() ทับฟอร์มที่ submit อยู่ ระหว่างสร้าง/ยืนยันบัญชี
  try {
    if (loginMode === "register"){
      // ตรวจสอบว่ามีชื่อผู้ใช้นี้ใน DB แล้วไหม
      const taken = await dbGet("usernames/" + username);
      if (taken){ setError("มีชื่อผู้ใช้นี้แล้ว ลองชื่ออื่น"); submitBtn.disabled=false; submitLabel.textContent="สมัครสมาชิก"; return; }
 
      // สร้างบัญชี Firebase Auth
      const cred = await withTimeout(auth.createUserWithEmailAndPassword(fakeEmail, password), 15000, "createUser");
      const uid  = cred.user.uid;
 
      // บันทึก profile ลง DB — ถ้าขั้นนี้ล้มเหลว ต้องลบบัญชี Auth ที่สร้างไปแล้วทิ้ง กันบัญชีค้าง (orphan) ที่ login ไม่ได้และสมัครซ้ำไม่ได้
      try {
        const profile = { username, role: loginRole, grade: loginRole==="student"?grade:null, createdAt: Date.now() };
        await dbSet("users/"     + uid,      profile);
        await dbSet("usernames/" + username, uid);   // index สำหรับเช็ค duplicate
        currentUser = { ...profile, uid };
      } catch(dbErr){
        console.error("DB write failed after creating auth user, rolling back:", dbErr);
        try { await cred.user.delete(); } catch(delErr){ console.error("Rollback delete failed:", delErr); }
        throw dbErr;
      }
      renderApp();
 
    } else {
      // Login
      const cred = await withTimeout(auth.signInWithEmailAndPassword(fakeEmail, password), 15000, "signIn");
      const uid  = cred.user.uid;
      const profile = await dbGet("users/" + uid);
      if (!profile){ setError("ไม่พบข้อมูลผู้ใช้ กรุณาติดต่อแอดมิน"); auth.signOut(); submitBtn.disabled=false; submitLabel.textContent="เข้าสู่ระบบ"; return; }
      currentUser = { ...profile, uid };
      renderApp();
    }
  } catch(err){
    console.error(err);
    const isTimeout = err && err.message && err.message.indexOf("timeout:") === 0;
    const errCode = (err && err.code) ? String(err.code).toUpperCase() : "";
    const debugTag = " [รหัสจริง: " + (err && err.code ? err.code : "ไม่มี") + (err && err.message ? " — " + err.message : "") + "]";
    const msg = (isTimeout
      ? "เชื่อมต่อช้าเกินไป ตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง"
      : errCode === "PERMISSION_DENIED"
      ? "บันทึกข้อมูลไม่ได้ ตรวจสอบว่าชื่อผู้ใช้ใช้ได้แค่ตัวอักษร ตัวเลข และขีดล่าง (_) หรือติดต่อแอดมินให้เช็ค Database Rules"
      : ({
          "auth/email-already-in-use": "มีชื่อผู้ใช้นี้แล้ว ลองชื่ออื่นหรือเข้าสู่ระบบแทน",
          "auth/user-not-found":       "ไม่พบบัญชีนี้ ลองสมัครสมาชิกก่อน",
          "auth/wrong-password":       "รหัสผ่านไม่ถูกต้อง",
          "auth/invalid-credential":   "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง",
          "auth/too-many-requests":    "ลองใหม่อีกครั้งในอีกสักครู่",
        }[err.code] || "เกิดข้อผิดพลาด: " + (err.message||""))) + (isTimeout ? "" : debugTag);
    setError(msg);
    submitBtn.disabled = false;
    submitLabel.textContent = loginMode==="login"?"เข้าสู่ระบบ":"สมัครสมาชิก";
  } finally {
    isAuthFlowInProgress = false;
  }
}

function suggestUsernameFrom(fbUser){
  const base = (fbUser.displayName || fbUser.email.split("@")[0] || "user")
    .toLowerCase()
    .replace(/[^a-z0-9ก-๙_]+/g, "")  // ตัดอักขระที่ไม่ใช่ตัวอักษร/เลข/ขีดล่าง (รองรับไทย)

  return base || "user" + fbUser.uid.slice(0, 6);
}

function wireAnnounceForm(){

  submitBtn.addEventListener("click", async ()=>{

async function sendChat(chatImgAttach){
  const input=document.getElementById("chat-input");
  const sendBtn=document.getElementById("chat-send");
  const text=input.value.trim(); const file=chatImgAttach?chatImgAttach.getFile():null;
  if(!text&&!file) return;
  const origHtml=sendBtn.innerHTML; input.value=""; sendBtn.disabled=true;
  try {
    let imageUrl=null;
    if(file){ sendBtn.innerHTML=iconSvg('loader-2',17,'#fff'); renderIcons(); const sp=sendBtn.querySelector('[data-lucide="loader-2"]'); if(sp)sp.classList.add("spin"); imageUrl=await processImageFile(file); chatImgAttach.reset(); }
    const id=uid();
    await dbSet("chat/"+id,{id,text,imageUrl,author:currentUser.username,role:currentUser.role,createdAt:Date.now()});
  } catch(e){ console.error(e); showToast(e.message||"ส่งข้อความไม่สำเร็จ"); input.value=text; }
  finally { sendBtn.innerHTML=origHtml; renderIcons(); sendBtn.disabled=false; }
}

function wireFeedCards(items){
  document.querySelectorAll("[data-like-btn]").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const pid=btn.getAttribute("data-like-btn"); const post=items.find(i=>i.id===pid);
      const likedBy=post.likedBy||{}; const liked=!!likedBy[currentUser.uid];
      const newLikedBy={...likedBy};
      if(liked) delete newLikedBy[currentUser.uid]; else newLikedBy[currentUser.uid]=true;
      post.likedBy=newLikedBy;
      try { await dbSet("feedposts/"+pid+"/likedBy",newLikedBy); loadFeed(); } catch(e){console.error(e);}
    });
  });
  document.querySelectorAll("[data-delete-post]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      confirmDelete({ title:'ลบโพสต์นี้?', sub:'โพสต์จะหายถาวร ทุกคนจะมองไม่เห็นอีกต่อไป', onConfirm:async()=>{ await dbDelete("feedposts/"+btn.getAttribute("data-delete-post")); showToast("ลบโพสต์แล้ว"); loadFeed(); } });
    });
  });
}

async function loadTickets(filterStatus){
  const listEl = document.getElementById("ticket-list");

  try {
    const data = await dbGet("tickets");
    let items = data ? Object.values(data) : [];
    items.sort((a,b)=>b.createdAt-a.createdAt);
    if(filterStatus && filterStatus !== "all") items = items.filter(t=>t.status===filterStatus);
    if(items.length===0){ listEl.innerHTML=emptyStateHtml('message-circle-warning','ยังไม่มีเรื่องร้องเรียน','เมื่อมีคนแจ้งเรื่องเข้ามา จะแสดงที่นี่'); renderIcons(); return; }
    listEl.innerHTML=`<div style="display:grid;gap:10px;">${items.map(t=>ticketCardHtml(t,isAdmin)).join("")}</div>`;
    renderIcons();
    if(isAdmin) wireTicketAdminControls(items);

}

async function renderPollsPage(){
  const isAdmin = currentUser.role === "admin";
  const content = document.getElementById("content-area");
  content.innerHTML=`<div class="fade-up">
    ${pageHeaderHtml('bar-chart-2','โพล & สำรวจความเห็น','บอกเลยว่าคิดยังไง — เสียงของคุณนับ!',
      isAdmin?`<button class="btn-primary font-display" id="new-poll-btn">${iconSvg('plus',15,'#fff')} สร้างโพล</button>`:"")}
    <div id="poll-form-slot"></div>
    <div id="poll-list">${loadingHtml()}</div>
  </div>`;
  renderIcons();
  if(isAdmin) document.getElementById("new-poll-btn").addEventListener("click",()=>openPollForm());
  await loadPolls();
}
 
function openPollForm(){
  const slot = document.getElementById("poll-form-slot");
  let choiceCount = 2;
  function choicesHtml(){
    let html="";
    for(let i=0;i<choiceCount;i++){
      html+=`<div class="poll-choice-row"><input class="input" id="choice-${i}" placeholder="ตัวเลือก ${i+1}" style="font-size:13.5px;">${i>=2?`<button type="button" class="btn-icon" style="color:var(--danger);" data-remove-choice="${i}">${iconSvg('minus-circle',16,'var(--danger)')}</button>`:""}</div>`;
    }
    return html;
  }
  function renderForm(){
    slot.innerHTML=`<div class="card pop-in new-poll-form" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span class="font-display" style="font-weight:700;color:var(--navy);font-size:15px;">สร้างโพลใหม่</span>
        <button class="btn-icon" id="close-poll-form">${iconSvg('x',16)}</button>
      </div>
      <div class="field"><label class="font-display" style="font-size:12.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px;">คำถาม</label>
        <input class="input" id="poll-question" placeholder="เช่น อยากให้เพิ่มเมนูอะไรในโรงอาหาร?" style="font-size:14px;"></div>
      <div class="field"><label class="font-display" style="font-size:12.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px;">ตัวเลือก</label>
        <div class="poll-choices-list" id="poll-choices-list">${choicesHtml()}</div>
        ${choiceCount<6?`<button type="button" class="btn-ghost font-display" id="add-choice-btn" style="padding:7px 13px;font-size:13px;">${iconSvg('plus-circle',14,'var(--navy)')} เพิ่มตัวเลือก</button>`:""}
      </div>
      <button class="btn-primary font-display" id="poll-submit" disabled>${iconSvg('send',14,'#fff')} เผยแพร่โพล</button>
    </div>`;
    renderIcons();
    document.getElementById("close-poll-form").addEventListener("click",()=>slot.innerHTML="");
    document.getElementById("poll-question").addEventListener("input",updatePollBtn);
    Array.from({length:choiceCount},(_,i)=>document.getElementById("choice-"+i)).forEach(el=>{if(el)el.addEventListener("input",updatePollBtn);});
    const addBtn = document.getElementById("add-choice-btn");
    if(addBtn) addBtn.addEventListener("click",()=>{ choiceCount++; renderForm(); });
    document.querySelectorAll("[data-remove-choice]").forEach(btn=>{
      btn.addEventListener("click",()=>{ choiceCount--; const idx=parseInt(btn.getAttribute("data-remove-choice")); const listEl=document.getElementById("poll-choices-list"); listEl.querySelectorAll(".poll-choice-row")[idx]?.remove(); updatePollBtn(); });
    });
    document.getElementById("poll-submit").addEventListener("click", submitPoll);
  }
  function updatePollBtn(){
    const q=document.getElementById("poll-question");
    const sb=document.getElementById("poll-submit");
    if(!q||!sb)return;
    const choices=getChoices();
    sb.disabled=!q.value.trim()||choices.filter(c=>c.trim()).length<2;
  }
  function getChoices(){ return Array.from({length:choiceCount},(_,i)=>{ const el=document.getElementById("choice-"+i); return el?el.value.trim():""; }).filter(c=>c); }
  async function submitPoll(){
    const q=document.getElementById("poll-question").value.trim();
    const choices=getChoices();
    if(!q||choices.length<2) return;
    const sb=document.getElementById("poll-submit"); sb.disabled=true;
    sb.innerHTML=`${iconSvg('loader-2',14,'#fff')} กำลังสร้าง...`; renderIcons(); const sp=sb.querySelector('[data-lucide="loader-2"]'); if(sp)sp.classList.add("spin");
    try {
      const id=uid();
      const choicesObj={};
      choices.forEach((c,i)=>{ choicesObj["opt"+i]={ text:c, votes:{} }; });
      await dbSet("polls/"+id,{ id, question:q, choices:choicesObj, createdAt:Date.now(), open:true, author:currentUser.username });
      slot.innerHTML=""; showToast("สร้างโพลเรียบร้อย!"); loadPolls();
    } catch(e){ console.error(e); showToast("เกิดข้อผิดพลาด"); sb.disabled=false; sb.innerHTML=`${iconSvg('send',14,'#fff')} เผยแพร่โพล`; renderIcons(); }
  }
  renderForm();
}
 
async function loadPolls(){
  const listEl = document.getElementById("poll-list");
  const isAdmin = currentUser.role === "admin";
  try {
    const data = await dbGet("polls");
    const items = data ? Object.values(data) : [];
    items.sort((a,b)=>b.createdAt-a.createdAt);
    if(items.length===0){ listEl.innerHTML=emptyStateHtml('bar-chart-2','ยังไม่มีโพล','พี่สภาจะสร้างโพลไว้ถามความเห็นพวกเรา'); renderIcons(); return; }
    listEl.innerHTML=`<div style="display:grid;gap:14px;">${items.map(p=>pollCardHtml(p,isAdmin)).join("")}</div>`;
    renderIcons(); wirePollCards(items);
  } catch(e){ console.error(e); listEl.innerHTML=emptyStateHtml('alert-circle','โหลดข้อมูลไม่สำเร็จ','ลองรีเฟรช'); renderIcons(); }
}
 
function pollCardHtml(p, isAdmin){
  const choices = p.choices ? Object.entries(p.choices) : [];
  const totalVotes = choices.reduce((sum,[,c])=>sum+Object.keys(c.votes||{}).length,0);
  const myVoteKey = choices.find(([,c])=>c.votes&&c.votes[currentUser.uid]);
  const hasVoted = !!myVoteKey;
  const isClosed = !p.open;
  return `<div class="card" data-poll-id="${p.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <div style="flex:1;min-width:0;">
        <h3 class="font-display" style="margin:0 0 3px;font-size:16px;font-weight:700;color:var(--ink);">${esc(p.question)}</h3>
        <span style="font-size:12px;color:var(--ink-soft);">โดย ${esc(p.author)} · ${timeAgo(p.createdAt)} · ${totalVotes} โหวต</span>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;align-items:center;">
        <span class="badge font-display" style="background:${isClosed?'var(--paper-deep)':'#ECFDF5'};color:${isClosed?'var(--ink-soft)':'#10B981'};">${isClosed?iconSvg('lock',11,'var(--ink-soft)')+'ปิดแล้ว':iconSvg('activity',11,'#10B981')+'เปิดอยู่'}</span>
        ${isAdmin?`<button class="btn-icon" style="color:var(--danger);" data-delete-poll="${p.id}">${iconSvg('trash-2',14,'var(--danger)')}</button>`:""}
        ${isAdmin?`<button class="btn-ghost font-display" data-toggle-poll="${p.id}" style="padding:5px 10px;font-size:12px;">${isClosed?iconSvg('unlock',12)+'เปิด':iconSvg('lock',12)+'ปิด'}</button>`:""}
      </div>
    </div>
    <div class="poll-options-wrap">
      ${choices.map(([key,c])=>{
        const voteCount = Object.keys(c.votes||{}).length;
        const pct = totalVotes>0?Math.round(voteCount/totalVotes*100):0;
        const isMyVote = c.votes&&c.votes[currentUser.uid];
        const showBar = hasVoted||isClosed;
        return `<button class="poll-option-btn font-display ${isMyVote?'voted':''}" data-poll-vote="${p.id}" data-choice-key="${key}" ${(hasVoted||isClosed)?'disabled':''}>
          ${showBar?`<div class="poll-option-bar" style="width:${pct}%;"></div>`:""}
          <div class="poll-option-text">${esc(c.text)}${showBar?`<span class="poll-pct">${pct}%</span>`:""}</div>
        </button>`;
      }).join("")}
    </div>
    ${hasVoted?`<p style="margin:8px 0 0;font-size:12px;color:var(--ink-soft);">${iconSvg('check-circle',12,'#10B981')} คุณโหวตแล้ว</p>`:""}
  </div>`;
}
 
function wirePollCards(items){
  document.querySelectorAll("[data-poll-vote]").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const pid=btn.getAttribute("data-poll-vote"); const choiceKey=btn.getAttribute("data-choice-key");
      const p=items.find(i=>i.id===pid); if(!p||!p.open)return;
      try {
        await dbSet("polls/"+pid+"/choices/"+choiceKey+"/votes/"+currentUser.uid, true);
        showToast("บันทึกการโหวตแล้ว!"); loadPolls();
      } catch(e){ console.error(e); showToast("เกิดข้อผิดพลาด"); }
    });
  });
  document.querySelectorAll("[data-delete-poll]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      confirmDelete({ title:'ลบโพลนี้?', sub:'โพลและผลโหวตทั้งหมดจะหายถาวร', onConfirm:async()=>{ await dbDelete("polls/"+btn.getAttribute("data-delete-poll")); showToast("ลบโพลแล้ว"); loadPolls(); } });
    });
  });
  document.querySelectorAll("[data-toggle-poll]").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const pid=btn.getAttribute("data-toggle-poll"); const p=items.find(i=>i.id===pid); if(!p)return;
      await dbSet("polls/"+pid+"/open",!p.open); showToast(p.open?"ปิดโพลแล้ว":"เปิดโพลแล้ว"); loadPolls();
    });
  });
}
 
/* ============================== START ============================== */
boot().catch(e=>{ console.error(e); document.getElementById("root").innerHTML=`<div style="padding:40px;text-align:center;color:#C0392B;font-family:sans-serif;">เกิดข้อผิดพลาด กรุณารีเฟรชหน้าใหม่<br><small>${e.message}</small></div>`; });
</script>
</body>
</html>
